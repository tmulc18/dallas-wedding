<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save the Date - Farbeen & Tommy</title>
    <!-- Favicon -->
    <link rel="icon" href="apple-touch-icon.png" type="image/png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cedarville+Cursive&display=swap');

        :root {
            /* Color palette */
            --bg-color: #f0ece3;
            --text-dark: #9b111e;
            --outline-color: #bebaa9;
            --espresso-color: #d4c4b0;
            /* Light warm tan */
            --sketch-color: #1a1a1a;
            /* Dark charcoal for the line art */
        }

        body,
        html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        /* --- BACKGROUND LAYER --- */
        .bg-layer {
            position: fixed;
            top: -200vh;
            left: 0;
            width: 100vw;
            height: 600vh;
            z-index: 1;
            display: flex;
            flex-direction: column;
            pointer-events: none;
        }

        .bg-line {
            font-size: 11vw;
            font-weight: 800;
            color: transparent;
            -webkit-text-stroke: 1.5px var(--outline-color);
            line-height: 1.1;
            white-space: nowrap;
            text-align: left;
            width: 200vw;
            margin-left: 0vw;
            letter-spacing: -0.02em;
        }

        /* --- FOREGROUND LAYER --- */
        .content-layer {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 300vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 45vh 0;
            box-sizing: border-box;
        }

        .fg-text {
            font-size: 10vw;
            font-weight: 800;
            color: var(--text-dark);
            text-align: center;
            margin: 0;
            text-transform: uppercase;
            line-height: 1;
            letter-spacing: -0.03em;
            text-shadow:
                -4px -4px 0 var(--bg-color),
                4px -4px 0 var(--bg-color),
                -4px 4px 0 var(--bg-color),
                4px 4px 0 var(--bg-color);
        }

        .location {
            word-spacing: 2vw;
            letter-spacing: -0.01em;
        }

        /* --- NEW: COFFEE RAVE SECTION --- */
        .coffee-section {
            position: relative;
            height: 100vh;
            width: 100vw;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: transparent;
        }

        .machine-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .lock-text {
            font-size: 8vw;
            margin-bottom: 2rem;
            z-index: 11;
        }

        /* The SVG Espresso Machine */
        .svg-machine {
            position: relative;
            width: 450px;
            height: 270px;
            z-index: 10;
        }

        .svg-machine svg {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        /* The expanding background circle */
        .espresso-flood {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background-color: var(--espresso-color);
            border-radius: 50%;
            opacity: 0;
            z-index: 20;
            pointer-events: none;
        }

        /* --- THE AGENDA --- */
        .agenda-content {
            position: fixed;
            top: 50%;
            left: 50%;
            z-index: 30;
            text-align: center;
            width: 90%;
            max-width: 1100px;
            opacity: 0;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .agenda-title {
            font-family: 'Cedarville Cursive', cursive;
            font-size: 8vw;
            font-weight: normal;
            color: var(--text-dark);
            text-shadow: none;
            margin-bottom: 2rem;
            text-transform: none;
        }

        .agenda-list {
            list-style: none;
            padding: 0;
            font-size: 2vw;
            font-weight: bold;
            line-height: 1.5;
            text-transform: uppercase;
            letter-spacing: 2px;
            width: 100%;
            max-width: 1000px;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .agenda-list li {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            align-items: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.15);
            padding-bottom: 0.5rem;
        }

        .agenda-list span.event {
            color: var(--text-dark);
            white-space: nowrap;
            text-align: left;
        }

        .agenda-list span.location {
            color: #333;
            white-space: nowrap;
            text-align: center;
        }

        .agenda-list span.time {
            color: var(--text-dark);
            white-space: nowrap;
            text-align: right;
        }

        .more-details {
            font-family: 'Cedarville Cursive', cursive;
            margin-top: 2rem;
            font-size: 2vw;
            font-style: normal;
            opacity: 0.7;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .bg-line {
                -webkit-text-stroke: 1px var(--outline-color);
            }

            .agenda-title {
                font-size: 12vw;
            }

            .agenda-list {
                font-size: 3.5vw;
            }

            .agenda-list li {
                grid-template-columns: 1fr 1fr 1fr;
            }

            .agenda-list span.event {
                text-align: left;
            }

            .agenda-list span.location {
                text-align: center;
            }

            .agenda-list span.time {
                text-align: right;
            }

            .more-details {
                font-size: 4vw;
            }

            .lock-text {
                font-size: 11vw;
            }

            .svg-machine {
                width: 380px;
                height: 228px;
            }
        }
    </style>
</head>

<body>

    <!-- 1. Background Parallax Layer -->
    <div class="bg-layer" id="parallax-bg"></div>

    <!-- 2. Foreground Initial Scroll Content -->
    <div class="content-layer">
        <h1 class="fg-text" id="section-date">NOVEMBER 21 2026</h1>
        <h1 class="fg-text location" id="section-location">DALLAS,  TX</h1>
        <h1 class="fg-text" id="section-save">SAVE THE DATE</h1>
    </div>

    <!-- GSAP Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollToPlugin.min.js"></script>

    <script>
        // --- 1. GENERATE BACKGROUND TEXT ---
        const bgLayer = document.getElementById('parallax-bg');
        const numLines = 150;
        let bgHtml = '';
        for (let i = 0; i < numLines; i++) {
            bgHtml += '<div class="bg-line">FARBEEN&TOMMY FARBEEN&TOMMY FARBEEN&TOMMY FARBEEN&TOMMY</div>';
        }
        bgLayer.innerHTML = bgHtml;

        // --- 2. PARALLAX SCROLL EFFECT ---
        let ticking = false;
        window.addEventListener('scroll', () => {
            if (!ticking) {
                window.requestAnimationFrame(() => {
                    const scrollPos = window.scrollY;
                    bgLayer.style.transform = `translateY(${scrollPos * 0.4}px)`;
                    ticking = false;
                });
                ticking = true;
            }
        });

        // --- 3. TRANSITION ANIMATION (Commented out - only showing save the date) ---
        /*
        gsap.registerPlugin(ScrollTrigger);

        gsap.set(".espresso-flood", { scale: 0, xPercent: -50, yPercent: -50 });

        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: ".coffee-section",
                start: "top top",
                end: "+=200%",
                scrub: 1,
                pin: true,
            }
        });

        tl.to(".espresso-flood", {
            opacity: 1,
            scale: 250,
            duration: 2,
            ease: "power3.inOut"
        });
        */


        // --- 4. AUTO-SCROLL HELPER (Simplified - stops at save the date) ---
        const pauseThreshold = 2000;

        const autoScrollSections = [
            { trigger: "#section-date", target: "#section-location", duration: 1, offsetY: 0.3 },
            { trigger: "#section-location", target: "#section-save", duration: 1, offsetY: 0.3 }
            // Removed scroll to coffee-section - stops at save the date
        ];

        autoScrollSections.forEach((section, index) => {
            let hasAutoScrolled = false;
            let pauseTimer = null;

            function clearPauseTimer() {
                if (pauseTimer) {
                    clearTimeout(pauseTimer);
                    pauseTimer = null;
                }
            }

            function startPauseTimer() {
                if (hasAutoScrolled) return;
                clearPauseTimer();

                pauseTimer = setTimeout(() => {
                    if (hasAutoScrolled) return;
                    hasAutoScrolled = true;

                    if (section.target === "coffee-end") {
                        const coffeeSection = document.querySelector('.coffee-section');
                        const coffeeTop = coffeeSection.getBoundingClientRect().top + window.scrollY;
                        gsap.to(window, {
                            scrollTo: coffeeTop + (window.innerHeight * 6.5),
                            duration: section.duration,
                            ease: "power1.inOut"
                        });
                    } else {
                        const targetEl = document.querySelector(section.target);
                        const targetHeight = targetEl ? targetEl.offsetHeight : 0;
                        const centerOffset = (window.innerHeight - targetHeight) / 2;
                        gsap.to(window, {
                            scrollTo: { y: section.target, offsetY: centerOffset },
                            duration: section.duration,
                            ease: "power1.inOut"
                        });
                    }
                }, pauseThreshold);
            }

            ScrollTrigger.create({
                trigger: section.trigger,
                start: "top 80%",
                end: "bottom 20%",
                onEnter: startPauseTimer,
                onLeave: () => { clearPauseTimer(); hasAutoScrolled = false; },
                onLeaveBack: () => { clearPauseTimer(); hasAutoScrolled = false; },
                onUpdate: () => {
                    if (pauseTimer && !hasAutoScrolled) startPauseTimer();
                }
            });
        });
    </script>

</body>
